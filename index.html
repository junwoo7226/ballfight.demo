<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bouncing Arena</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts (Pretendard 스타일의 Noto Sans KR 적용) -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #f8fafc;
      user-select: none;
    }
    /* 이쁜 스크롤바 디자인 */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 overflow-x-hidden">

  <!-- 메인 게임 컨테이너 -->
  <div class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl p-6 border border-slate-100 flex flex-col items-center">
    
    <!-- 헤더 타이틀 -->
    <div class="text-center mb-6">
      <h1 class="text-3xl font-black text-slate-800 tracking-wider">BOUNCING ARENA</h1>
      <p class="text-sm text-slate-500 mt-1">부딪히고 튕기며 능력을 사용하는 자동 대전 시뮬레이터</p>
    </div>

    <!-- 대기실 / 캐릭터 선택 스크린 -->
    <div id="lobby-screen" class="w-full flex flex-col items-center">
      <h2 class="text-xl font-bold text-slate-700 mb-6">전투에 참여할 캐릭터 2명을 선택하세요!</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl mb-8">
        
        <!-- 플레이어 1 선택 카드 (왼쪽 캐릭터) -->
        <div class="bg-slate-50 p-6 rounded-2xl border-2 border-dashed border-pink-300 flex flex-col items-center relative overflow-hidden">
          <div class="absolute top-2 left-3 bg-pink-500 text-white text-xs font-bold px-2 py-1 rounded">PLAYER 1</div>
          <span class="text-xs text-pink-600 font-semibold mb-2 mt-2">왼쪽 진영 (핑크 프레임)</span>
          
          <div class="flex flex-wrap gap-2 w-full mt-2">
            <button onclick="selectCharacter(1, 'hong')" id="p1-hong" class="flex-1 min-w-[70px] py-3 px-2 bg-pink-500 text-white font-bold rounded-xl transition duration-200 transform hover:scale-105 text-sm shadow-md">
              홍태민
            </button>
            <button onclick="selectCharacter(1, 'jung')" id="p1-jung" class="flex-1 min-w-[70px] py-3 px-2 bg-white text-slate-700 border border-slate-300 font-bold rounded-xl transition duration-200 transform hover:scale-105 text-sm">
              정재엽
            </button>
            <button onclick="selectCharacter(1, 'chronos')" id="p1-chronos" class="flex-1 min-w-[70px] py-3 px-2 bg-white text-slate-700 border border-slate-300 font-bold rounded-xl transition duration-200 transform hover:scale-105 text-sm">
              그분
            </button>
            <button onclick="selectCharacter(1, 'kang')" id="p1-kang" class="flex-1 min-w-[70px] py-3 px-2 bg-white text-slate-700 border border-slate-300 font-bold rounded-xl transition duration-200 transform hover:scale-105 text-sm">
              강은준
            </button>
          </div>

          <!-- 선택된 캐릭터 상세 정보 -->
          <div id="p1-info" class="mt-6 w-full bg-white p-4 rounded-xl border border-slate-100 text-sm min-h-[140px]">
            <!-- 동적으로 주입됨 -->
          </div>
        </div>

        <!-- 플레이어 2 선택 카드 (오른쪽 캐릭터) -->
        <div class="bg-slate-50 p-6 rounded-2xl border-2 border-dashed border-cyan-300 flex flex-col items-center relative overflow-hidden">
          <div class="absolute top-2 left-3 bg-cyan-500 text-white text-xs font-bold px-2 py-1 rounded">PLAYER 2</div>
          <span class="text-xs text-cyan-600 font-semibold mb-2 mt-2">오른쪽 진영 (블루 프레임)</span>
          
          <div class="flex flex-wrap gap-2 w-full mt-2">
            <button onclick="selectCharacter(2, 'hong')" id="p2-hong" class="flex-1 min-w-[70px] py-3 px-2 bg-white text-slate-700 border border-slate-300 font-bold rounded-xl transition duration-200 transform hover:scale-105 text-sm">
              홍태민
            </button>
            <button onclick="selectCharacter(2, 'jung')" id="p2-jung" class="flex-1 min-w-[70px] py-3 px-2 bg-cyan-500 text-white font-bold rounded-xl transition duration-200 transform hover:scale-105 text-sm shadow-md">
              정재엽
            </button>
            <button onclick="selectCharacter(2, 'chronos')" id="p2-chronos" class="flex-1 min-w-[70px] py-3 px-2 bg-white text-slate-700 border border-slate-300 font-bold rounded-xl transition duration-200 transform hover:scale-105 text-sm">
              그분
            </button>
            <button onclick="selectCharacter(2, 'kang')" id="p2-kang" class="flex-1 min-w-[70px] py-3 px-2 bg-white text-slate-700 border border-slate-300 font-bold rounded-xl transition duration-200 transform hover:scale-105 text-sm">
              강은준
            </button>
          </div>

          <!-- 선택된 캐릭터 상세 정보 -->
          <div id="p2-info" class="mt-6 w-full bg-white p-4 rounded-xl border border-slate-100 text-sm min-h-[140px]">
            <!-- 동적으로 주입됨 -->
          </div>
        </div>

      </div>

      <!-- 대전 시작 버튼 -->
      <button onclick="startGame()" class="px-12 py-4 bg-gradient-to-r from-pink-500 to-cyan-500 text-white text-xl font-black rounded-2xl shadow-lg hover:from-pink-600 hover:to-cyan-600 transition duration-300 transform hover:-translate-y-1">
        전투 시작!
      </button>
    </div>

    <!-- 실제 게임 실행 스크린 (기본 숨김) -->
    <div id="game-screen" class="hidden w-full flex flex-col items-center">
      
      <!-- 상단 컨트롤/알림 바 -->
      <div class="flex justify-between items-center w-full max-w-[600px] mb-4">
        <button onclick="resetToLobby()" class="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 font-bold rounded-lg text-xs transition">
          ◀ 캐릭터 다시 고르기
        </button>
        <div id="battle-status" class="text-sm font-bold text-rose-500 bg-rose-50 px-3 py-1 rounded-full animate-pulse">
          전투 진행 중...
        </div>
        <button onclick="restartBattle()" class="px-4 py-2 bg-slate-800 text-white hover:bg-slate-900 font-bold rounded-lg text-xs transition">
          다시 하기 ↻
        </button>
      </div>

      <!-- 게임 캔버스 (정사각형 아레나 비율) -->
      <div class="relative bg-white border-[6px] border-slate-950 shadow-inner rounded-md overflow-hidden max-w-full" style="width: 550px; height: 550px;">
        <canvas id="gameCanvas" width="550" height="550" class="block w-full h-full"></canvas>
        
        <!-- 대전 결과 오버레이 (게임 종료 시 표시) -->
        <div id="game-over-modal" class="hidden absolute inset-0 bg-black/70 backdrop-blur-sm flex flex-col items-center justify-center text-white p-6 transition-all duration-300">
          <h3 class="text-3xl font-black mb-2 tracking-wide text-yellow-400">전투 종료!</h3>
          <p id="winner-text" class="text-xl font-bold mb-6"></p>
          <div class="flex space-x-4">
            <button onclick="restartBattle()" class="px-6 py-2.5 bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-extrabold rounded-lg transition">
              재경기
            </button>
            <button onclick="resetToLobby()" class="px-6 py-2.5 bg-slate-700 hover:bg-slate-600 text-white font-extrabold rounded-lg transition">
              로비로 이동
            </button>
          </div>
        </div>
      </div>

      <!-- 하단 상태 인터페이스 (업로드 이미지와 동일한 구조) -->
      <div class="w-full max-w-[550px] mt-4 flex justify-between items-start gap-4 px-1">
        
        <!-- 왼쪽 캐릭터 (Player 1) 상태창 -->
        <div class="w-[47%] flex flex-col">
          <div id="hud-p1-name" class="text-2xl font-black text-slate-700 truncate leading-none mb-1.5 text-left">
            홍태민
          </div>
          <!-- HP 바 백그라운드 -->
          <div class="w-full bg-slate-200 h-6 rounded-none border border-slate-800 overflow-hidden relative">
            <div id="hud-p1-hp" class="bg-[#2ecc71] h-full w-full transition-all duration-100 ease-out"></div>
            <span id="hud-p1-hp-text" class="absolute inset-0 flex items-center justify-center text-xs font-black text-white drop-shadow-[0_1px_1px_rgba(0,0,0,0.8)]">
              250 / 250
            </span>
          </div>
          <!-- 쿨타임 바 -->
          <div class="w-full bg-slate-300 h-2.5 rounded-none border-x border-b border-slate-800 overflow-hidden relative">
            <div id="hud-p1-cool" class="bg-pink-500 h-full w-[40%] transition-all duration-75"></div>
          </div>
        </div>

        <!-- 오른쪽 캐릭터 (Player 2) 상태창 -->
        <div class="w-[47%] flex flex-col items-end">
          <div id="hud-p2-name" class="text-2xl font-black text-[#d63031] truncate leading-none mb-1.5 text-right">
            정재엽
          </div>
          <!-- HP 바 백그라운드 -->
          <div class="w-full bg-slate-200 h-6 rounded-none border border-slate-800 overflow-hidden relative">
            <div id="hud-p2-hp" class="bg-[#2ecc71] h-full w-full transition-all duration-100 ease-out"></div>
            <span id="hud-p2-hp-text" class="absolute inset-0 flex items-center justify-center text-xs font-black text-white drop-shadow-[0_1px_1px_rgba(0,0,0,0.8)]">
              200 / 200
            </span>
          </div>
          <!-- 쿨타임 바 -->
          <div class="w-full bg-slate-300 h-2.5 rounded-none border-x border-b border-slate-800 overflow-hidden relative">
            <div id="hud-p2-cool" class="bg-cyan-500 h-full w-[60%] transition-all duration-75"></div>
          </div>
        </div>

      </div>

    </div>

  </div>

  <!-- 가이드 세션 -->
  <div class="w-full max-w-4xl mt-6 p-4 bg-slate-100 rounded-2xl text-slate-600 text-xs text-center border border-slate-200">
    💡 <b>게임 규칙:</b> 경기 시작 시 캐릭터는 무작위 방향으로 튕겨 나가며 자동으로 싸웁니다. 
    두 캐릭터가 격돌하면 물리 탄성 규칙에 의해 당구공처럼 튕기며, 각 캐릭터는 쿨타임마다 고유 스킬을 시전합니다!
  </div>

  <script>
    // --- 캐릭터 설정 정보 ---
    const CHAR_CONFIG = {
      hong: {
        key: 'hong',
        name: '홍태민',
        maxHp: 250,
        speedType: '느림',
        speedValue: 1.8, // 느린 물리 속도
        cooldown: 5000, // 5초 쿨타임
        color: '#ff2d55', // 핑크/로즈 테두리
        bgColor: '#ffe3e8', // 연한 분홍 배경
        desc: "<b>체력형 격투가</b><br>체력이 매우 높지만 속도가 다소 느립니다. 5초마다 전방의 적에게 강렬한 원투 펀치를 시전해 엄청난 폭발 데미지를 줍니다.",
        abilityDesc: "👊 <b>주먹 휘두르기 (쿨 5초):</b> 캐릭터 주변 사거리(지름의 1.5배) 내 적에게 각각 30씩 총 2회의 충격 데미지(총 60)를 입힙니다."
      },
      jung: {
        key: 'jung',
        name: '정재엽',
        maxHp: 200,
        speedType: '보통',
        speedValue: 3.2, // 보통 물리 속도
        cooldown: 7000, // 7초 쿨타임
        color: '#0984e3', // 푸른색 테두리
        bgColor: '#e0f2fe', // 연한 하늘색 배경
        desc: "<b>한방형 전사</b><br>평균 능력치와 준수한 속도를 가졌습니다. 스킬이 준비되면 상시 강화 상태가 되어 부딪히는 적에게 치명적인 일격을 입힙니다.",
        abilityDesc: "⚡ <b>우흥 일격 (쿨 7초):</b> 쿨타임 완료 시 머리 위에 '우흥'이 유지되며, 적과 부딪힐 시 120 데미지를 준 후 '딱!' 문구와 함께 폭발합니다."
      },
      chronos: {
        key: 'chronos',
        name: '그분',
        maxHp: 300,
        speedType: '느림',
        speedValue: 1.8, // 느린 물리 속도
        cooldown: 999999, // 단발성 궁극기이므로 무한에 가까운 대기 시간 설정
        color: '#9b59b6', // 보라색 테두리
        bgColor: '#f5eef8', // 연한 보라색 배경
        desc: "<b>시간의 조율사</b><br>체력이 극도로 높지만 속도가 느립니다. 신비로운 시간대를 동조하여 게임 시작 후 일정 시간이 지나면 적을 완전 소멸시킵니다.",
        abilityDesc: "⏳ <b>시간의 종말 (단 1회):</b> 시작 3초 후 머리 위에 '523'이 표시되며, 5초가 추가로 흐르면 상대를 즉시 처치(HP 0)합니다."
      },
      kang: {
        key: 'kang',
        name: '강은준',
        maxHp: 250,
        speedType: '빠름',
        speedValue: 4.4, // 빠른 물리 속도
        cooldown: 6000, // 6초 쿨타임
        color: '#e67e22', // 주황색 테두리
        bgColor: '#fef5e7', // 연한 주황 배경
        desc: "<b>유도 기술의 달인</b><br>준수한 민첩성과 탄탄한 제압 능력을 겸비한 격투가입니다. 상대방과 부딪히면 무력화한 후 벽으로 내동댕이칩니다.",
        abilityDesc: "🥋 <b>업어치기 (쿨 6초):</b> 상대와 부딪히면 2초간 완전히 잡아 행동 및 스킬을 봉쇄하고, 무작위 벽으로 집어던져 80 데미지를 줍니다."
      }
    };

    // 현재 플레이어 선택 현황
    let p1Selected = 'hong';
    let p2Selected = 'jung';

    // 캔버스 및 그래픽 Context
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game states
    let animationId = null;
    let particles = [];
    let gameActive = false;
    let characters = [];

    // --- 초기 셋업 ---
    window.onload = () => {
      selectCharacter(1, 'hong');
      selectCharacter(2, 'jung');
    };

    // 캐릭터 선택 처리 함수
    function selectCharacter(playerNum, charKey) {
      const keys = ['hong', 'jung', 'chronos', 'kang'];
      if (playerNum === 1) {
        p1Selected = charKey;
        keys.forEach(k => {
          const btn = document.getElementById(`p1-${k}`);
          if (k === charKey) {
            btn.className = 'flex-1 min-w-[70px] py-3 px-2 bg-pink-500 text-white font-bold rounded-xl transition shadow-md text-sm';
          } else {
            btn.className = 'flex-1 min-w-[70px] py-3 px-2 bg-white text-slate-700 border border-slate-300 font-bold rounded-xl transition text-sm';
          }
        });
        
        const config = CHAR_CONFIG[charKey];
        document.getElementById('p1-info').innerHTML = `
          <div class="font-bold text-base text-pink-600 mb-1">${config.name}</div>
          <div class="mb-2 text-slate-600 leading-tight">${config.desc}</div>
          <div class="text-xs text-slate-500 font-medium pt-1.5 border-t border-slate-100">${config.abilityDesc}</div>
          <div class="grid grid-cols-2 gap-2 mt-2 text-xs text-slate-400">
            <div><b>체력:</b> ${config.maxHp}</div>
            <div><b>속도:</b> ${config.speedType}</div>
          </div>
        `;
      } else {
        p2Selected = charKey;
        keys.forEach(k => {
          const btn = document.getElementById(`p2-${k}`);
          if (k === charKey) {
            btn.className = 'flex-1 min-w-[70px] py-3 px-2 bg-cyan-500 text-white font-bold rounded-xl transition shadow-md text-sm';
          } else {
            btn.className = 'flex-1 min-w-[70px] py-3 px-2 bg-white text-slate-700 border border-slate-300 font-bold rounded-xl transition text-sm';
          }
        });
        
        const config = CHAR_CONFIG[charKey];
        document.getElementById('p2-info').innerHTML = `
          <div class="font-bold text-base text-cyan-600 mb-1">${config.name}</div>
          <div class="mb-2 text-slate-600 leading-tight">${config.desc}</div>
          <div class="text-xs text-slate-500 font-medium pt-1.5 border-t border-slate-100">${config.abilityDesc}</div>
          <div class="grid grid-cols-2 gap-2 mt-2 text-xs text-slate-400">
            <div><b>체력:</b> ${config.maxHp}</div>
            <div><b>속도:</b> ${config.speedType}</div>
          </div>
        `;
      }
    }

    function resetToLobby() {
      gameActive = false;
      if (animationId) cancelAnimationFrame(animationId);
      
      document.getElementById('lobby-screen').classList.remove('hidden');
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('game-over-modal').classList.add('hidden');
    }

    function restartBattle() {
      document.getElementById('game-over-modal').classList.add('hidden');
      startGame();
    }

    function startGame() {
      document.getElementById('lobby-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      
      const p1Config = CHAR_CONFIG[p1Selected];
      const p2Config = CHAR_CONFIG[p2Selected];

      const hudP1Name = document.getElementById('hud-p1-name');
      hudP1Name.innerText = p1Config.name;
      hudP1Name.style.color = p1Config.color;

      const hudP2Name = document.getElementById('hud-p2-name');
      hudP2Name.innerText = p2Config.name;
      hudP2Name.style.color = p2Config.color;

      document.getElementById('battle-status').innerText = "전투 진행 중...";
      document.getElementById('battle-status').className = "text-sm font-bold text-rose-500 bg-rose-50 px-3 py-1 rounded-full animate-pulse";

      initGameSession(p1Config, p2Config);
    }

    // --- 파티클 클래스 ---
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 1.5;
        this.vy = (Math.random() - 0.5) * 1.5;
        this.radius = Math.random() * 5 + 3;
        this.alpha = 1;
        this.color = color;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 0.02;
        if (this.alpha < 0) this.alpha = 0;
      }

      draw(context) {
        context.save();
        context.globalAlpha = this.alpha;
        context.beginPath();
        context.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        context.fillStyle = this.color;
        context.shadowBlur = 8;
        context.shadowColor = this.color;
        context.fill();
        context.restore();
      }
    }

    // --- 부유 데미지 이펙트 ---
    let damageTexts = [];
    class DamageText {
      constructor(x, y, text, color = '#ff3838', scale = 1) {
        this.x = x;
        this.y = y - 20;
        this.text = text;
        this.color = color;
        this.alpha = 1.0;
        this.vy = -1.2;
        this.scale = scale;
      }
      update() {
        this.y += this.vy;
        this.alpha -= 0.025;
      }
      draw(context) {
        if (this.alpha <= 0) return;
        context.save();
        context.globalAlpha = this.alpha;
        context.font = `black ${Math.floor(18 * this.scale)}px 'Noto Sans KR'`;
        context.fillStyle = this.color;
        context.textBaseline = 'middle';
        context.textAlign = 'center';
        context.strokeStyle = '#ffffff';
        context.lineWidth = 3;
        context.strokeText(this.text, this.x, this.y);
        context.fillText(this.text, this.x, this.y);
        context.restore();
      }
    }

    // --- 홍태민 주먹 모션 ---
    let actionEffects = [];
    class PunchEffect {
      constructor(startX, startY, targetX, targetY, callback) {
        this.startX = startX;
        this.startY = startY;
        this.targetX = targetX;
        this.targetY = targetY;
        this.progress = 0;
        this.speed = 0.075;
        this.currentX = startX;
        this.currentY = startY;
        this.callback = callback;
        this.hasHit = false;
      }
      update() {
        this.progress += this.speed;
        if (this.progress < 0.5) {
          const t = this.progress * 2;
          this.currentX = this.startX + (this.targetX - this.startX) * t;
          this.currentY = this.startY + (this.targetY - this.startY) * t;
        } else if (this.progress < 1.0) {
          const t = (this.progress - 0.5) * 2;
          this.currentX = this.targetX + (this.startX - this.targetX) * t;
          this.currentY = this.targetY + (this.startY - this.targetY) * t;
          
          if (!this.hasHit) {
            this.hasHit = true;
            if (this.callback) this.callback();
          }
        }
      }
      draw(context) {
        context.save();
        context.beginPath();
        context.strokeStyle = 'rgba(255, 45, 85, 0.45)';
        context.lineWidth = 24;
        context.lineCap = 'round';
        context.moveTo(this.startX, this.startY);
        context.lineTo(this.currentX, this.currentY);
        context.stroke();

        context.beginPath();
        context.arc(this.currentX, this.currentY, 22, 0, Math.PI * 2);
        context.fillStyle = '#ff2d55';
        context.strokeStyle = '#ffffff';
        context.lineWidth = 4.5;
        context.shadowBlur = 12;
        context.shadowColor = '#ff2d55';
        context.fill();
        context.stroke();

        context.beginPath();
        context.arc(this.currentX - 5, this.currentY - 5, 10, 0, Math.PI * 2);
        context.fillStyle = 'rgba(255, 255, 255, 0.3)';
        context.fill();

        if (this.progress >= 0.4 && this.progress <= 0.6) {
          context.fillStyle = '#ffcc00';
          context.font = "bold 22px 'Noto Sans KR'";
          context.fillText("💥퍽!", this.currentX - 15, this.currentY - 28);
        }
        context.restore();
      }
    }

    // --- 물리 캐릭터 객체 클래스 ---
    class GameCharacter {
      constructor(config, side, x, y) {
        this.key = config.key;
        this.name = config.name;
        this.side = side;
        this.maxHp = config.maxHp;
        this.hp = config.maxHp;
        this.color = config.color;
        this.bgColor = config.bgColor;
        this.baseSpeed = config.speedValue;
        
        this.radius = 42;
        this.x = x;
        this.y = y;

        const angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * this.baseSpeed;
        this.vy = Math.sin(angle) * this.baseSpeed;

        this.cooldownMax = config.cooldown;
        this.cooldownCurrent = 0;
        
        // 정재엽 관련 스킬 상태 변수
        this.uHeungState = 0; // 0: 대기, 1: 우흥 온, 2: 딱! 유지중
        this.ddakTimer = 0;  

        // 크로노스 관련 타이머 (경기 시작 후 누적 시간)
        this.elapsedTime = 0;
        this.chronosFinished = false;

        // 강은준 관련 스킬 상태 변수 (잡기 및 던지기 물리 제어)
        this.grabbedTarget = null;
        this.isGrabbed = false;
        this.isThrown = false;
        this.grabTimer = 0;
      }

      update(canvasWidth, canvasHeight) {
        // 제압/잡힌 상태라면 스스로는 제어 불가 (강은준의 스크립트가 위치 동기화)
        if (this.isGrabbed) {
          return;
        }

        // 강은준 잡기 유지 및 던지기 타이머 갱신
        if (this.grabbedTarget) {
          this.grabTimer--;
          
          // 대상을 겹쳐 보이지 않게, 서로 외곽선이 닿는 딱 붙은 위치(반지름의 2배인 84px)로 정밀하게 묶어둡니다.
          const dx = this.grabbedTarget.x - this.x;
          const dy = this.grabbedTarget.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          
          this.grabbedTarget.x = this.x + (dx / dist) * (this.radius * 2);
          this.grabbedTarget.y = this.y + (dy / dist) * (this.radius * 2);
          this.grabbedTarget.vx = 0;
          this.grabbedTarget.vy = 0;
          
          // 잡고 있는 도중에는 본인도 움직이지 않음
          this.vx = 0;
          this.vy = 0;

          if (this.grabTimer <= 0) {
            // 2초 속박 완료 후 무작위 벽으로 집어던지기
            const target = this.grabbedTarget;
            target.isGrabbed = false;
            target.isThrown = true;
            this.grabbedTarget = null;

            const walls = ['left', 'right', 'top', 'bottom'];
            const chosenWall = walls[Math.floor(Math.random() * walls.length)];
            const throwForce = 15.5; // 매우 빠르게 날아가기

            if (chosenWall === 'left') {
              target.vx = -throwForce;
              target.vy = (Math.random() - 0.5) * 3;
            } else if (chosenWall === 'right') {
              target.vx = throwForce;
              target.vy = (Math.random() - 0.5) * 3;
            } else if (chosenWall === 'top') {
              target.vx = (Math.random() - 0.5) * 3;
              target.vy = -throwForce;
            } else {
              target.vx = (Math.random() - 0.5) * 3;
              target.vy = throwForce;
            }

            damageTexts.push(new DamageText(this.x, this.y, "🥋 던지기!", "#e67e22", 1.4));
            this.cooldownCurrent = this.cooldownMax; // 쿨타임 개시

            // 화려한 던지기 불꽃 먼지 이펙트 생성
            for (let i = 0; i < 15; i++) {
              particles.push(new Particle(this.x, this.y, '#e67e22'));
            }
          }
          return;
        }

        this.x += this.vx;
        this.y += this.vy;

        // 아레나 벽 바운싱 및 던져진 캐릭터 충돌 데미지 연산
        let hitWall = false;
        if (this.x - this.radius <= 0) {
          this.x = this.radius;
          this.vx = -this.vx;
          hitWall = true;
        } else if (this.x + this.radius >= canvasWidth) {
          this.x = canvasWidth - this.radius;
          this.vx = -this.vx;
          hitWall = true;
        }

        if (this.y - this.radius <= 0) {
          this.y = this.radius;
          this.vy = -this.vy;
          hitWall = true;
        } else if (this.y + this.radius >= canvasHeight) {
          this.y = canvasHeight - this.radius;
          this.vy = -this.vy;
          hitWall = true;
        }

        if (hitWall) {
          this.playImpactEffect();

          // 강은준에 의해 던져진 상대가 벽에 충돌한 경우
          if (this.isThrown) {
            this.takeDamage(80);
            damageTexts.push(new DamageText(this.x, this.y, "💥 80!", "#d35400", 1.6));
            this.isThrown = false; // 던져진 특수 상태 해제

            // 던져진 순간 속도(초고속)에서 원래 캐릭터 고유의 고유 이동 속도로 정밀 복원
            const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy) || 1;
            this.vx = (this.vx / currentSpeed) * this.baseSpeed;
            this.vy = (this.vy / currentSpeed) * this.baseSpeed;

            // 벽 격돌 강타 이펙트 파티클 마구 생성
            for (let i = 0; i < 22; i++) {
              particles.push(new Particle(this.x, this.y, '#e67e22'));
            }
          }
        }

        // 이동 궤적 파티클 효과
        if (Math.random() < 0.18) {
          const particleColor = this.side === 1 ? 'rgba(255, 107, 129, 0.6)' : 'rgba(84, 160, 255, 0.6)';
          particles.push(new Particle(this.x + (Math.random() - 0.5) * 15, this.y + (Math.random() - 0.5) * 15, particleColor));
        }

        // 스킬 쿨타임 처리
        if (this.cooldownCurrent > 0) {
          this.cooldownCurrent -= 16.67;
          if (this.cooldownCurrent < 0) this.cooldownCurrent = 0;
        }

        // 정재엽 스킬 자동 활성화
        if (this.key === 'jung' && this.cooldownCurrent === 0 && this.uHeungState === 0) {
          this.uHeungState = 1;
        }

        // '딱!' 이펙트 유지 타이머 연산
        if (this.key === 'jung' && this.uHeungState === 2) {
          this.ddakTimer--;
          if (this.ddakTimer <= 0) {
            this.uHeungState = 0;
            this.cooldownCurrent = this.cooldownMax;
          }
        }

        // 크로노스 고유 시간 경과 메커니즘
        if (this.key === 'chronos' && !this.chronosFinished) {
          this.elapsedTime += 16.67; 

          // 8초 경과 시 상대방 즉사 (3초 대기 + 5초 카운트다운 완료)
          if (this.elapsedTime >= 8000) {
            this.chronosFinished = true;
            const target = (this.side === 1) ? characters[1] : characters[0];
            target.takeDamage(target.maxHp); // 체력 전량 소진시켜 즉사시킴

            damageTexts.push(new DamageText(target.x, target.y, "⏳ 종말 발동!", "#9b59b6", 1.8));

            // 화려한 보라빛 소멸 파티클 생성
            for (let i = 0; i < 35; i++) {
              particles.push(new Particle(target.x, target.y, '#9b59b6'));
            }
          }
        }
      }

      playImpactEffect() {
        for (let i = 0; i < 5; i++) {
          particles.push(new Particle(this.x, this.y, '#54a0ff'));
        }
      }

      // 강은준 전용: 잡기 스킬 가동 메소드
      startGrab(target) {
        this.grabbedTarget = target;
        target.isGrabbed = true;
        this.grabTimer = 120; // 2초 (60프레임 기준 120프레임)
        
        // 강제 멈춤 제어
        this.vx = 0; this.vy = 0;
        target.vx = 0; target.vy = 0;

        // 최초 접촉 각도를 기반으로 겹치지 않고 딱 붙는 위치 설정
        const dx = target.x - this.x;
        const dy = target.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        target.x = this.x + (dx / dist) * (this.radius * 2);
        target.y = this.y + (dy / dist) * (this.radius * 2);

        damageTexts.push(new DamageText(this.x, this.y - 12, "🥋 잡기!", "#e67e22", 1.3));
      }

      draw(context) {
        context.save();

        context.shadowBlur = 18;
        context.shadowColor = this.color;

        // 원형 캐릭터 겉 테두리 광채 효과
        context.beginPath();
        context.arc(this.x, this.y, this.radius + 3, 0, Math.PI * 2);
        context.fillStyle = 'rgba(255, 255, 255, 0.9)';
        context.fill();

        context.lineWidth = 4;
        context.strokeStyle = this.color;
        context.stroke();

        // 내부 캐릭터 원 및 이름 드로잉
        context.beginPath();
        context.arc(this.x, this.y, this.radius - 1, 0, Math.PI * 2);
        context.fillStyle = this.bgColor;
        context.fill();

        context.shadowBlur = 0;
        context.fillStyle = '#1e293b';
        context.font = "bold 16px 'Noto Sans KR'";
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.fillText(this.name, this.x, this.y);

        context.restore();

        // 텍스트 말풍선 드로잉
        this.drawSkillSpeechBubble(context);
      }

      drawSkillSpeechBubble(context) {
        if (this.key === 'jung') {
          if (this.uHeungState === 1) {
            this.renderTextBubble(context, "우흥", "#ffeaa7", "#d63031");
          } else if (this.uHeungState === 2) {
            this.renderTextBubble(context, "딱!", "#ff7675", "#ffffff");
          }
        }

        if (this.key === 'chronos') {
          if (this.elapsedTime >= 3000 && this.elapsedTime < 8000) {
            this.renderTextBubble(context, "523", "#e8f8f5", "#9b59b6");
          } else if (this.elapsedTime >= 8000) {
            this.renderTextBubble(context, "종말!", "#111111", "#e74c3c");
          }
        }

        // 강은준 붙잡기 스킬 시전 중 말풍선 띄우기
        if (this.key === 'kang') {
          if (this.grabbedTarget) {
            this.renderTextBubble(context, "잡기!", "#fef5e7", "#e67e22");
          }
        }
      }

      renderTextBubble(context, text, bgColor, textColor) {
        context.save();
        
        const bubbleW = 80;
        const bubbleH = 38;
        const bx = this.x - bubbleW / 2;
        const by = this.y - this.radius - bubbleH - 10;

        // 말풍선 본체
        context.beginPath();
        context.roundRect(bx, by, bubbleW, bubbleH, 10);
        context.fillStyle = bgColor;
        context.shadowBlur = 8;
        context.shadowColor = 'rgba(0,0,0,0.15)';
        context.fill();
        
        context.strokeStyle = textColor;
        context.lineWidth = 2.5;
        context.stroke();

        // 말풍선 아래 꼬리 렌더링
        context.beginPath();
        context.moveTo(this.x - 8, by + bubbleH);
        context.lineTo(this.x, by + bubbleH + 8);
        context.lineTo(this.x + 8, by + bubbleH);
        context.fillStyle = bgColor;
        context.fill();
        context.stroke();

        // 글씨 쓰기
        context.fillStyle = textColor;
        context.font = "900 21px 'Noto Sans KR'";
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.fillText(text, this.x, by + bubbleH / 2 + 1.5);
        context.restore();
      }

      takeDamage(amount) {
        this.hp -= amount;
        if (this.hp < 0) this.hp = 0;
        
        for (let i = 0; i < 12; i++) {
          particles.push(new Particle(this.x, this.y, '#ff4757'));
        }
      }
    }


    // --- 충돌 판정 및 물리 대전 세션 시작 ---
    function initGameSession(p1Config, p2Config) {
      if (animationId) cancelAnimationFrame(animationId);
      
      particles = [];
      damageTexts = [];
      actionEffects = [];
      gameActive = true;

      // 양쪽 시작 진영으로 안전하게 격리 배치
      characters = [
        new GameCharacter(p1Config, 1, 150, 380),
        new GameCharacter(p2Config, 2, 380, 250)
      ];

      updateUIHUD();
      gameLoop();
    }

    // 메인 연산 및 드로잉 무한 루프
    function gameLoop() {
      if (!gameActive) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackgroundGrid();

      // 파티클 업데이트 및 렌더링
      particles.forEach((p, idx) => {
        p.update();
        p.draw(ctx);
        if (p.alpha <= 0) particles.splice(idx, 1);
      });

      // 캐릭터 물리 위치 업데이트
      characters.forEach(char => {
        char.update(canvas.width, canvas.height);
      });

      // 자동 유도 스킬 감지
      processSkillAutocast();

      // 캐릭터 간 당구 물리 법칙 격돌 계산
      handleCharacterToCharacterCollision(characters[0], characters[1]);

      // 공격 액션 모션 이펙트 처리
      actionEffects.forEach((eff, idx) => {
        eff.update();
        eff.draw(ctx);
        if (eff.progress >= 1.0) actionEffects.splice(idx, 1);
      });

      // 캐릭터 드로우
      characters.forEach(char => {
        char.draw(ctx);
      });

      // 피해량 등 숫자가 서서히 떠오르는 텍스트 이펙트
      damageTexts.forEach((t, idx) => {
        t.update();
        t.draw(ctx);
        if (t.alpha <= 0) damageTexts.splice(idx, 1);
      });

      updateUIHUD();
      checkBattleOver();

      animationId = requestAnimationFrame(gameLoop);
    }

    // 아레나 배경 눈금 격자
    function drawBackgroundGrid() {
      ctx.save();
      ctx.strokeStyle = '#f1f5f9';
      ctx.lineWidth = 1;
      
      const step = 25;
      for (let x = 0; x < canvas.width; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    // 두 원형 오브젝트 간 탄성 물리 및 충돌 처리
    function handleCharacterToCharacterCollision(c1, c2) {
      const dx = c2.x - c1.x;
      const dy = c2.y - c1.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const minDistance = c1.radius + c2.radius;

      if (distance < minDistance) {
        // 위치 겹침 보정
        const overlap = minDistance - distance;
        const nx = dx / distance;
        const ny = dy / distance;

        c1.x -= nx * (overlap / 2);
        c1.y -= ny * (overlap / 2);
        c2.x += nx * (overlap / 2);
        c2.y += ny * (overlap / 2);

        // --- 강은준 전용: 업어치기 충돌 판정 및 제압 우선 개시 ---
        if (c1.key === 'kang' && c1.cooldownCurrent === 0 && !c1.grabbedTarget && !c1.isGrabbed && !c2.isGrabbed) {
          c1.startGrab(c2);
          return;
        } else if (c2.key === 'kang' && c2.cooldownCurrent === 0 && !c2.grabbedTarget && !c2.isGrabbed && !c1.isGrabbed) {
          c2.startGrab(c1);
          return;
        }

        // 당구공 튕김 기본 물리
        const kx = c1.vx - c2.vx;
        const ky = c1.vy - c2.vy;
        
        const p = nx * kx + ny * ky;

        if (p > 0) {
          c1.vx -= nx * p;
          c1.vy -= ny * p;
          c2.vx += nx * p;
          c2.vy += ny * p;
        }

        // 충돌 공격 발동 여부 감지 (정재엽)
        handleCollisionAttackSkills(c1, c2);
      }
    }

    // 캐릭터간 격돌 시 발동하는 특수 스킬(정재엽) 판정
    function handleCollisionAttackSkills(c1, c2) {
      [c1, c2].forEach(char => {
        const target = (char === c1) ? c2 : c1;

        // 정재엽 스킬 발동 (데미지가 120으로 상향되었습니다)
        if (char.key === 'jung' && char.uHeungState === 1) {
          target.takeDamage(120);
          damageTexts.push(new DamageText(target.x, target.y, "⚡ 120!", "#eb4d4b", 1.5));
          
          char.uHeungState = 2;
          char.ddakTimer = 60; // 1초 유지

          for (let i = 0; i < 20; i++) {
            particles.push(new Particle(target.x, target.y, '#ff7675'));
          }
        }
      });
    }

    // 오토 스킬 타게팅 및 발동 로직 (홍태민 전방 주먹 사거리 연산)
    function processSkillAutocast() {
      characters.forEach(char => {
        // 붙잡혀 제압된 상태라면 이 캐릭터의 자동 스킬 구동만 스킵
        if (char.isGrabbed) {
          return; // 콜백 함수 탈출 (다음 캐릭터 루프로 진행)
        }

        if (char.key === 'hong' && char.cooldownCurrent === 0) {
          const target = (char.side === 1) ? characters[1] : characters[0];
          
          const dx = target.x - char.x;
          const dy = target.y - char.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          // 사거리 감지 조정: 캐릭터가 서로 부딪히는 거리인 84px(radius*2)보다 넓은 126px(radius*3)로 증가시켜, 
          // 직접 접촉하지 않고 근접하기만 해도 주먹 기술을 즉시 발동하도록 수정했습니다.
          const attackRange = char.radius * 3;

          if (distance <= attackRange) {
            char.cooldownCurrent = char.cooldownMax;

            // 1번째 펀치
            actionEffects.push(new PunchEffect(char.x, char.y, target.x, target.y, () => {
              target.takeDamage(30);
              damageTexts.push(new DamageText(target.x, target.y, "👊 30!", "#ff2d55", 1.2));
            }));

            // 2번째 펀치 (시간차 0.35초 딜레이)
            setTimeout(() => {
              if (!gameActive) return;
              actionEffects.push(new PunchEffect(char.x, char.y, target.x, target.y, () => {
                target.takeDamage(30);
                damageTexts.push(new DamageText(target.x, target.y, "👊 30!", "#ff2d55", 1.2));
              }));
            }, 350);
          }
        }
      });
    }

    // 체력 및 쿨타임 바 동기화
    function updateUIHUD() {
      const p1 = characters[0];
      const p2 = characters[1];

      if (!p1 || !p2) return;

      const p1HpPercent = (p1.hp / p1.maxHp) * 100;
      const p2HpPercent = (p2.hp / p2.maxHp) * 100;

      document.getElementById('hud-p1-hp').style.width = `${p1HpPercent}%`;
      document.getElementById('hud-p2-hp').style.width = `${p2HpPercent}%`;

      document.getElementById('hud-p1-hp-text').innerText = `${Math.floor(p1.hp)} / ${p1.maxHp}`;
      document.getElementById('hud-p2-hp-text').innerText = `${Math.floor(p2.hp)} / ${p2.maxHp}`;

      // 플레이어 1 쿨타임 UI 처리
      let p1CoolPercent = 100;
      if (p1.cooldownCurrent > 0) {
        p1CoolPercent = ((p1.cooldownMax - p1.cooldownCurrent) / p1.cooldownMax) * 100;
      }
      document.getElementById('hud-p1-cool').style.width = `${p1CoolPercent}%`;

      // 플레이어 2 쿨타임 UI 처리
      let p2CoolPercent = 100;
      if (p2.cooldownCurrent > 0) {
        p2CoolPercent = ((p2.cooldownMax - p2.cooldownCurrent) / p2.cooldownMax) * 100;
      }
      document.getElementById('hud-p2-cool').style.width = `${p2CoolPercent}%`;
    }

    // 경기 오버 상태 확인
    function checkBattleOver() {
      const p1 = characters[0];
      const p2 = characters[1];

      if (p1.hp <= 0 || p2.hp <= 0) {
        gameActive = false;
        if (animationId) cancelAnimationFrame(animationId);

        let winnerMessage = "";
        
        if (p1.hp <= 0 && p2.hp <= 0) {
          winnerMessage = "승부를 가릴 수 없는 장렬한 동시 폭발 무승부!";
        } else if (p1.hp <= 0) {
          winnerMessage = `👑 ${p2.name} (Player 2) 승리!`;
        } else {
          winnerMessage = `👑 ${p1.name} (Player 1) 승리!`;
        }

        document.getElementById('winner-text').innerText = winnerMessage;
        document.getElementById('battle-status').innerText = "전투 종료";
        document.getElementById('battle-status').className = "text-sm font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-full";

        const modal = document.getElementById('game-over-modal');
        modal.classList.remove('hidden');
      }
    }
  </script>
